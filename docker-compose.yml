version: '3.8'

services:
  php:
    build:
      context: .
      dockerfile: PHP.Dockerfile
    volumes:
      - ./websites/default/public:/var/www/html
    expose:
      - 9000
    networks:
      - schoolmate-network

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./websites/default/public:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - schoolmate-network

networks:
  schoolmate-network:
    driver: bridge
