services:
  php:
    build:
      context: .
      dockerfile: PHP.Dockerfile
    volumes:
      - ./websites:/websites
    expose:
      - 9000

  web:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./websites:/websites
    depends_on:
      - php

  mysql:
    image: mariadb:latest
    environment:
      MYSQL_ROOT_PASSWORD: pass
      MYSQL_USER: pass
      MYSQL_PASSWORD: pass
    volumes:
      - mysqldata:/var/lib/mysql
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: pass
    depends_on:
      - mysql

volumes:
  mysqldata:
